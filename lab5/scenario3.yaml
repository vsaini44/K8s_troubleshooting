apiVersion: apps/v1
kind: Deployment
metadata:
 name: slow-app
spec:
 replicas: 1
 selector:
   matchLabels:
     app: slow
 template:
   metadata:
     labels:
       app: slow
   spec:
     containers:
     - name: app
       image: nginx
       readinessProbe:
         httpGet:
           path: /notfound
           port: 80
         initialDelaySeconds: 5
         periodSeconds: 5
